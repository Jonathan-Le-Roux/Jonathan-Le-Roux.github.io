name: "Jonathan Le Roux"
tagline: "Student | Resourceful | Dedicated "

about: |

  I am a South African-born Master's student in Data Science at the University 
  of Arizona. I am driven by a passion for problem-solving, business, and 
  understanding how the world works. These interests have led me to pursue data 
  science as a way to uncover meaningful insights and better understand the 
  truths hidden within complex systems.

  I have completed my Bachelor of Science in Data science at Michigan State University 
  achieving a 3.88 GPA while completing an honors-level curriculum in Mathematics, 
  Statistics and Data Science. I have taken upper-level classes in AI, Big Data Analysis, 
  Bayesian Statistical Methods, and Database systems while consistently being 
  in the highest scoring cohort. While completing my degree I have also earned
  Dean’s list recognition in all but one semester. On the side, I also completed
  courses on Coursera for data analytics through Google and Data Science through
  IBM.

  My most significant accomplishment is my research role at the Facility for 
  Rare Isotope Beams (FRIB) where I am tasked with applying Markov-Chain Monte 
  Carlo simulations to analyze more than 60TB of data. Our team are likely to 
  publish within the next year.

  Recently I have been leading a small team working for an AI company focused on 
  creating a subject agnostic tool that is able to find pain points of people in a 
  specific subject so that start-up businesses can figure out a problem to solve

  I have taken an all-inclusive approach to learning data science, and I have a 
  special interest in bringing data-driven insights to business. 


